<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Loja de Cartas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container mt-5" style="max-width: 400px;">
    <div class="card bg-dark text-white p-4 border-secondary shadow">
        <h2 class="text-center mb-4" style="color: gold;">Login Cliente</h2>

        <form id="formLogin">
            <div class="mb-3">
                <label for="loginEmail" class="form-label">E-mail</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="seu@email.com" required>
            </div>

            <div class="mb-3">
                <label for="loginSenha" class="form-label">Senha</label>
                <input type="password" id="loginSenha" class="form-control" placeholder="Sua senha" required>
            </div>

            <button type="submit" class="btn btn-warning w-100 fw-bold mb-3">Entrar</button>

            <div class="text-center">
                <a href="criar-cliente.html" class="text-info text-decoration-none small">Não tem uma conta? Cadastre-se aqui</a>
            </div>
            <div class="text-center mt-2">
                <a href="index.html" class="text-secondary text-decoration-none small">← Voltar para a Loja</a>
            </div>
        </form>
    </div>
</div>

<script src="app.js"></script>
<script>
    document.getElementById("formLogin").addEventListener("submit", loginCliente);
</script>
</body>
</html>
