<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container mt-5">
    <h1>Editar Cliente</h1>

    <form id="formCliente">
        <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" id="nome" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="dataDeNascimento" class="form-label">Data de Nascimento</label>
            <input type="date" id="dataDeNascimento" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="genero" class="form-label">Gênero</label>
            <select id="genero" class="form-control" required>
                <option value="">Selecione...</option>
                <option value="Masculino">Masculino</option>
                <option value="Feminino">Feminino</option>
                <option value="Outro">Outro</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Salvar Alterações</button>
        <a href="dashboard-funcionario.html" class="btn btn-secondary">Voltar</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    carregarCliente(id);
    document.getElementById("formCliente").addEventListener("submit", function(event) {
        event.preventDefault();
        editarCliente(id);
    });
</script>
</body>
</html>
