<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Carta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container mt-5">
    <h1>Editar Carta</h1>
    <form id="formEditar">
        <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" id="nome" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">ATK</label>
            <input type="number" id="atk" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">defesa</label>
            <input type="number" id="defesa" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Preço</label>
            <input type="number" step="0.01" id="preco" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Quantidade</label>
            <input type="number" id="quantidade" class="form-control">
        </div>

        <button class="btn btn-warning">Atualizar</button>
        <a href="index.html" class="btn btn-secondary">Voltar</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    carregarCarta(id);
    document.getElementById("formEditar").addEventListener("submit", (event) => {
        event.preventDefault();
        editarCarta(id);
    });
</script>
</body>
</html>
