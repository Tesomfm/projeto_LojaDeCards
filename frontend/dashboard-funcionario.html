<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Controle do Funcionário</title>
    <link rel="icon" type="image/png" href="kaibamen.jpeg">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center bg-dark p-3 rounded border border-danger mb-4">
        <div class="d-flex align-items-center">

            <img src="mokuba.png" alt="Ícone Painel" width="40" height="40" class="me-3">
            <div>
                <h2 class="m-0 text-danger" style="font-size: 1.5rem;">⚙️ Painel de Operações</h2>
                <span class="text-secondary small">Modo Administrativo</span>
            </div>
        </div>
        <div>
            <a href="criar.html" class="btn btn-success btn-sm fw-bold">+ Cadastrar Nova Carta</a>
            <button onclick="logoutFuncionario()" class="btn btn-outline-light btn-sm ms-2">Encerrar Sessão</button>
        </div>
    </div>

    <ul class="nav nav-tabs border-secondary mb-4" id="adminTabs" role="tablist">
        <li class="nav-item">
            <button class="nav-link active text-light bg-dark border-secondary" id="cartas-tab" data-bs-toggle="tab" data-bs-target="#panel-cartas" type="button" onclick="mudarPainelAdmin('cartas')">Gerenciar Cartas Yu-Gi-Oh</button>
        </li>
        <li class="nav-item">
            <button class="nav-link text-light bg-dark border-secondary" id="clientes-tab" data-bs-toggle="tab" data-bs-target="#panel-clientes" type="button" onclick="mudarPainelAdmin('clientes')">Gerenciar Cadastro de Clientes</button>
        </li>
    </ul>

    <!-- Painel de Cartas -->
    <div id="panel-cartas" class="admin-section">
        <div class="input-group mb-3">
            <input type="text" id="buscaNomeCartaAdmin" class="form-control" placeholder="Pesquisar cartas no estoque global...">
            <button class="btn btn-danger" onclick="pesquisarCartasAdmin(1)">Filtrar Estoque</button>
        </div>
        <table class="table table-dark table-striped align-middle">
            <thead>
                <tr>
                    <th>Nome da Carta</th>
                    <th>ATK</th>
                    <th>DEF</th>
                    <th>Preço Unitário</th>
                    <th>Estoque Atual</th>
                    <th>Controles do Funcionário</th>
                </tr>
            </thead>
            <tbody id="tabelaCartasAdmin"></tbody>
        </table>
        <div class="d-flex justify-content-center mt-3" id="paginacaoCartasAdmin"></div>
    </div>

    <!-- Painel de Clientes -->
    <div id="panel-clientes" class="admin-section d-none">
        <div class="input-group mb-3">
            <input type="text" id="buscaNomeClienteAdmin" class="form-control" placeholder="Pesquisar clientes por nome de registro...">
            <button class="btn btn-danger" onclick="pesquisarClientesAdmin(1)">Filtrar Usuários</button>
        </div>
        <table class="table table-dark table-striped align-middle">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome Completo</th>
                    <th>Data de Nascimento</th>
                    <th>Gênero</th>
                    <th>Controles do Funcionário</th>
                </tr>
            </thead>
            <tbody id="tabelaClientesAdmin"></tbody>
        </table>
        <div class="d-flex justify-content-center mt-3" id="paginacaoClientesAdmin"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
    if (!localStorage.getItem("funcionarioToken")) {
        alert("Acesso restrito! Identifique-se primeiro.");
        window.location.href = "login-funcionario.html";
    } else {
        listarCartasAdmin(1);
        listarClientesAdmin(1);
    }
</script>
</body>
</html>
