<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Clientes Cadastrados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center">
        <h1>Nossos Clientes</h1>
        <div>
            <a href="index.html" class="btn btn-secondary btn-sm">Voltar à Vitrine</a>
            <a href="criar-cliente.html" class="btn btn-success btn-sm">Criar Nova Conta</a>
        </div>
    </div>

    <div id="erro" class="alert alert-danger d-none mt-3"></div>

    <div class="input-group mt-4 mb-3">
        <input type="text" id="buscaNome" class="form-control" placeholder="Filtrar clientes por nome...">
        <button class="btn btn-primary" onclick="pesquisarClientes(1)">Pesquisar</button>
    </div>

    <table class="table table-dark table-striped mt-4 align-middle">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Data de Nascimento</th>
                <th>Gênero</th>
            </tr>
        </thead>
        <tbody id="tabelaClientes"></tbody>
    </table>

    <nav><ul class="pagination justify-content-center" id="paginacaoClientes"></ul></nav>
</div>
<script src="app.js"></script>
<script>
    pesquisarClientes(1);
</script>
</body>
</html>
