<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center">
        <h1>Clientes</h1>
        <div>
            <a href="index.html" class="btn btn-secondary">Cartas</a>
            <a href="criar-cliente.html" class="btn btn-success">Novo Cliente</a>
        </div>
    </div>

    <div id="erro" class="alert alert-danger d-none mt-3"></div>
    <div class="input-group mt-4 mb-3">
        <input type="text" id="buscaNome" class="form-control" placeholder="Pesquisar por nome...">
        <button class="btn btn-primary" onclick="pesquisarClientes()">Pesquisar</button>
    </div>
    <table class="table table-dark table-striped mt-4">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Data de Nascimento</th>
                <th>Gênero</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabelaClientes"></tbody> 
    </table>
    <div id="paginacao" class="mt-3"></div>
    <div id="erro" class="alert alert-danger d-none"></div>
</div>

<script src="app.js"></script>
<script>
    listarClientes(); 
</script>
</body>
</html>
