<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criar Carta</title>
    <link rel="icon" type="image/png" href="kaibamen.jpeg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container mt-5">
    <h1>Criar Carta</h1>
    <form id="formCarta">
        <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" id="nome" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">ATK</label>
            <input type="number" id="atk" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">defesa</label>
            <input type="number" id="defesa" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Preço</label>
            <input type="number" step="0.01" id="preco" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Quantidade</label>
            <input type="number" id="quantidade" class="form-control">
        </div>

        <button class="btn btn-primary">Salvar</button>
        <a href="dashboard-funcionario.html" class="btn btn-secondary">Voltar</a>
    </form>
    <div id="mensagem" class="mt-3"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
    document.getElementById("formCarta").addEventListener("submit", criarCarta);
</script>
</body>
</html>
