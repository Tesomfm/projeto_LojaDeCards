<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cartas</title>
    <link rel="icon" type="image/png" href="kaibamen.jpeg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-end mb-3" id="authArea">
    </div>

    <div class="d-flex justify-content-between align-items-center">
        <h1>
            <img src="kaibamen.jpeg" alt="Ícone Kaibamen Shop" width="80" height="80" class="me-2 align-middle">
            Kaibamen Shop Yu-Gi-Oh
        </h1>
        <div>
            <a href="login-funcionario.html" class="btn btn-secondary">Login funcionário</a>
        </div>
    </div>

    <div class="input-group mt-4 mb-3">
        <input type="text" id="buscaNome" class="form-control" placeholder="Pesquisar por nome...">
        <button class="btn btn-primary" onclick="pesquisarCartas()">Pesquisar</button>
    </div>
    <table class="table table-dark table-striped mt-4">
        <thead>
            <tr>
                <th>Nome</th>
                <th>ATK</th>
                <th>Defesa</th>
                <th>Preço</th>
                <th>Quantidade</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabelaCartas"></tbody>
    </table>
    <div class="d-flex justify-content-center mt-3" id="paginacao"></div>

    <div id="erro" class="alert alert-danger d-none"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
    atualizarInterfaceAutenticacao();
    listarCartas();
</script>
</body>
</html>
