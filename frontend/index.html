<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Loja de Cartas Yu-Gi-Oh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-white">
<div class="container mt-5">
    <div class="d-flex justify-content-end mb-3" id="authArea"></div>

    <div class="d-flex justify-content-between align-items-center">
        <h1>Loja de Cartas Yu-Gi-Oh</h1>
        <div>
            </div>
    </div>
    
    <div class="input-group mt-4 mb-3">
        <input type="text" id="buscaNome" class="form-control" placeholder="Pesquisar carta por nome...">
        <button class="btn btn-primary" onclick="pesquisarCartas()">Pesquisar</button>
    </div>

    <table class="table table-dark table-striped mt-4">
        <thead>
            <tr>
                <th>Nome</th>
                <th>ATK</th>
                <th>Defesa</th>
                <th>Preço</th>
                <th>Quantidade</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabelaCartas"></tbody>
    </table>
</div>

<footer class="container text-center mt-5 pt-3 border-top border-secondary">
    <a href="login-funcionario.html" class="text-secondary text-decoration-none small">Acesso Administrativo</a>
</footer>

<script src="app.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        atualizarInterfaceAutenticacao();
        pesquisarCartas();
    });
</script>
</body>
</html>
